  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --border-color: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --success-color: #10b981;
      --success-bg: rgba(16, 185, 129, 0.15);
      --error-color: #ef4444;
      --error-bg: rgba(239, 68, 68, 0.15);
      --warning-color: #f59e0b;
      --radius: 12px;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }

    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --border-color: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --accent-color: #4f46e5;
      --accent-hover: #4338ca;
      --success-color: #059669;
      --success-bg: rgba(5, 150, 105, 0.1);
      --error-color: #dc2626;
      --error-bg: rgba(220, 38, 38, 0.1);
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s, color 0.3s;
    }

    header {
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .title-area h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .title-area p {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-primary);
      color: var(--text-primary);
      cursor: pointer;
      font-weight: 500;
      font-size: 0.875rem;
      transition: all 0.2s;
    }

    .btn:hover {
      border-color: var(--accent-color);
      color: var(--accent-color);
    }

    .btn-primary {
      background: var(--accent-color);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      color: white;
    }

    .container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 2rem;
      flex: 1;
    }

    @media (max-width: 992px) {
  .container {
    grid-template-columns: 1fr;
    gap: 1.25rem;
    margin: 1rem auto;
    padding: 0 1rem;
  }

  /* 1. عرض السؤال أولاً في الأعلى على الجوال */
  .question-card {
    order: 1;
  }

  /* 2. نقل قائمة أرقام الأسئلة لأسفل كارت السؤال وإلغاء التثبيت المزعج */
  .sidebar {
    order: 2;
    position: static;
  }

  /* 3. جعل أزرار الأرقام تتوزع بـ 7 أعمدة وتقليل ارتفاع القائمة لتناسب الشاشة */
  .grid-nav {
    grid-template-columns: repeat(7, 1fr);
    max-height: 180px;
  }
}


    /* Sidebar Navigation */
    .sidebar {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 1.5rem;
      height: fit-content;
      position: sticky;
      top: 90px;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .progress-bar-bg {
      background: var(--border-color);
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .progress-bar-fill {
      background: var(--accent-color);
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
    }

    .grid-nav {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.5rem;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    .grid-nav-btn {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .grid-nav-btn:hover {
      border-color: var(--accent-color);
      color: var(--text-primary);
    }

    .grid-nav-btn.active {
      border-color: var(--accent-color);
      outline: 2px solid var(--accent-color);
    }

    .grid-nav-btn.correct {
      background: var(--success-bg);
      border-color: var(--success-color);
      color: var(--success-color);
    }

    .grid-nav-btn.incorrect {
      background: var(--error-bg);
      border-color: var(--error-color);
      color: var(--error-color);
    }

    /* Question Card Area */
    .question-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
    }

    .question-number {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent-color);
    }

    .question-text {
      font-size: 1.1rem;
      line-height: 1.6;
      font-weight: 500;
      color: var(--text-primary);
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .option-item {
      padding: 1rem 1.25rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-primary);
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      transition: all 0.2s;
    }

    .option-item:hover {
      border-color: var(--accent-color);
    }

    .option-key {
      font-weight: 700;
      color: var(--accent-color);
      min-width: 24px;
    }

    .option-text {
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-primary);
    }

    /* Option States */
    .option-item.selected {
      border-color: var(--accent-color);
      background: rgba(99, 102, 241, 0.1);
    }

    .option-item.correct {
      border-color: var(--success-color);
      background: var(--success-bg);
    }

    .option-item.incorrect {
      border-color: var(--error-color);
      background: var(--error-bg);
    }

    /* Explanation Box */
    .explanation-box {
      background: var(--bg-primary);
      border-left: 4px solid var(--accent-color);
      padding: 1.25rem;
      border-radius: 0 8px 8px 0;
      margin-top: 1rem;
      display: none;
    }

    .explanation-box.show {
      display: block;
    }

    .explanation-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent-color);
      margin-bottom: 0.5rem;
    }

    .explanation-text {
      font-size: 0.925rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* Footer Controls */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      border-top: 1px solid var(--border-color);
      padding-top: 1.5rem;
    }

    .mode-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--border-color);
      color: var(--text-secondary);
    }
  </style>
</head>
<body data-theme="dark">

  <script>
    // Complete 70 Questions Data Structure
    const questionsData = [
      {
        id: 1,
        question: "A data scientist applies K-Means clustering to an unlabeled corporate dataset and achieves an exceptionally high Silhouette Score. However, upon manual inspection, an expert domain analyst notes that the algorithm grouped the records based on arbitrary system-generated timestamp increments rather than actual underlying operational characteristics. Which core challenge of unsupervised learning does this scenario directly illustrate?",
        options: {
          A: "The computational inability of distance metrics to handle high-dimensional spaces.",
          B: "The lack of direct ground truth feedback, making models highly prone to prioritizing statistically dominant but semantically irrelevant features.",
          C: "The complete failure of iterative model building within exploratory data analysis.",
          D: "The architectural constraint where dimensionality reduction must precede clustering pipelines."
        },
        answer: "B",
        explanation: "Unsupervised learning lacks ground truth labels to guide the algorithm toward semantically meaningful patterns. Consequently, without human validation or explicit preprocessing, the model optimizes purely for mathematical distance, which can easily be dominated by mathematically distinct but irrelevant variables like timestamps."
      },
      {
        id: 2,
        question: "An engineer is designing a failure-prediction system for an industrial turbine. They have access to a dataset containing millions of operational cycles collected during a period when the turbine was verified to be operating with 100% perfection under strict quality control. The engineer wants the system to flag any future deviations or unknown mechanical configurations. Which paradigm is most appropriate, and what is its strict data requirement?",
        options: {
          A: "Anomaly Detection; it must tolerate a noisy, unvetted training set containing unknown defects.",
          B: "Novelty Detection; it requires a completely clean training set free of any anomalous or unwanted instances.",
          C: "Out-of-Distribution Detection; it mandates a multi-class dataset containing pre-categorized failure modes.",
          D: "Association Rule Learning; it requires establishing conditional transactions between binary features."
        },
        answer: "B",
        explanation: "Novelty detection focuses on identifying new, unseen but valid patterns, which fundamentally requires a clean training dataset representing only the 'normal' class. Anomaly detection, conversely, is typically applied when the training data is noisy and contains unclassified outliers that need to be filtered out."
      },
      {
        id: 3,
        question: "A convolutional neural network is trained on the CIFAR-10 image dataset (containing 10 distinct everyday object classes) to serve as an embedded asset classifier. During deployment, the system is exposed to images from the SVHN (Street View House Numbers) dataset. To prevent the model from assigning a high-confidence, erroneous label to these digits, which framework must be implemented?",
        options: {
          A: "Single-Class Novelty Detection targeting semantic anomalies.",
          B: "Association Rule Learning to establish co-occurrence dependencies between pixels.",
          C: "Multi-Class Out-of-Distribution (OOD) Detection to flag data originating from a completely foreign distribution.",
          D: "Hierarchical Clustering to subdivide the images into structural subgroups based on color gradients."
        },
        answer: "C",
        explanation: "When a model trained on a specific set of classes (In-distribution, like CIFAR-10) is exposed to an entirely different dataset with separate semantics (Out-of-distribution, like SVHN), it requires Out-of-Distribution (OOD) detection under a multi-class paradigm to identify and reject the foreign inputs."
      },
      {
        id: 4,
        question: "Mathematically, an unscaled feature with values in the millions dominates an SVM classifier's optimization process. What is the precise geometric mechanism causing this performance degradation?",
        options: {
          A: "The large-magnitude feature forces the RBF kernel to artificially compress all distance computations toward infinity.",
          B: "The SVM kernel calculates distances that skew the margin, causing the decision boundary to become highly sensitive to, and aligned with, the axis of the dominant feature.",
          C: "The unscaled feature causes the Euclidean length of every data point to equal exactly zero, neutralizing the support vectors.",
          D: "The optimization algorithm switches from an optimization objective to a descriptive clustering objective."
        },
        answer: "B",
        explanation: "SVMs find an optimal separating hyperplane by maximizing the margin, a process highly dependent on geometric distance computations. Features with larger magnitudes dominate these distance metrics, causing the margin to warp and become heavily skewed along the dominant feature's axis, rendering smaller but potentially crucial features statistically invisible."
      },
      {
        id: 5,
        question: "A data pipeline applies MinMaxScaler to a training dataset, calculating a specific feature range. When the fitted scaler is applied via .transform() to the isolated test set, several resulting values are found to be $-0.15$ and $1.22$. What does this mathematically indicate about the test set, and how should it be resolved?",
        options: {
          A: "It indicates a programming bug; MinMaxScaler strictly clamps all outputs to $[0, 1]$ regardless of input characteristics.",
          B: "It indicates that the test set features contain values that fall outside the minimum and maximum boundaries established by the training set; this is normal and prevents data leakage.",
          C: "It indicates data leakage; the scaler should be re-fitted on the test set separately to ensure alignment.",
          D: "It indicates that the data follows a strict Gaussian distribution and should have been processed with RobustScaler instead."
        },
        answer: "B",
        explanation: "MinMaxScaler uses the training set's minimum and maximum values as constants for transformation ($x_{norm} = \\frac{x - min(X_{train})}{max(X_{train}) - min(X_{train})}$). If the test set contains values smaller than $min(X_{train})$ or larger than $max(X_{train})$, the outputs will naturally fall outside the $[0, 1]$ range. This is correct and necessary to preserve the true relative distribution without introducing data leakage."
      },
      {
        id: 6,
        question: "You are preprocessing a dataset where one specific feature represents financial transaction amounts. This feature exhibits a highly skewed distribution with extreme, valid macro-outliers due to occasional high-value institutional transfers. If you require a scaler that centers the data without allowing these extreme outliers to compress the variance of the typical consumer transactions, which tool should you select?",
        options: {
          A: "StandardScaler, because it guarantees a variance of exactly 1 regardless of outlier distribution.",
          B: "MinMaxScaler, because it preserves the exact relative distances between all points in a closed range.",
          C: "RobustScaler, because it uses the median and the interquartile range (IQR), making its scaling parameters resilient to extreme values.",
          D: "Normalizer, because it forces each individual sample to have a Euclidean length of 1."
        },
        answer: "C",
        explanation: "RobustScaler calculates scaling statistics based on the median and quartiles (IQR) rather than the mean and variance. Because the mean and variance are highly sensitive to extreme outliers, estimators like StandardScaler would be heavily distorted, whereas RobustScaler ensures the main body of the data is scaled appropriately while leaving the outliers uncompressed."
      },
      {
        id: 7,
        question: "In a natural language processing pipeline, text documents are converted into high-dimensional term-frequency vectors. The absolute word counts vary dramatically based purely on document length, but the core analytical task depends entirely on the relative angles between document vectors rather than their absolute magnitudes. Which preprocessing transformer is mathematically tailored for this task?",
        options: {
          A: "StandardScaler, to center the word frequencies around a mean of zero.",
          B: "Normalizer, because it scales each data point independently so that its Euclidean length equals 1, isolating the angular relationships.",
          C: "MinMaxScaler, to compress all token frequencies between 0 and 1 across the column axis.",
          D: "RobustScaler, to eliminate the impact of rare vocabulary outliers across documents."
        },
        answer: "B",
        explanation: "Normalizer acts horizontally across rows rather than columns, scaling each individual sample to have a unit norm (Euclidean length of 1). This is ideal when the magnitudes of the features are irrelevant or highly variable (e.g., document length), and only the direction or angle (such as Cosine Similarity) matters."
      },
      {
        id: 8,
        question: "Consider the following machine learning pipeline sequence:\n1. Load full dataset.\n2. Instantiate MinMaxScaler.\n3. Apply fit_transform() on the full dataset.\n4. Split the scaled data into training and testing sets using train_test_split.\nWhat structural flaw exists in this architectural design?",
        options: {
          A: "The pipeline will crash because MinMaxScaler cannot process un-split arrays.",
          B: "It causes severe data leakage because information about the global maximum and minimum of the test set is used to transform the training set.",
          C: "It alters the shape of the data arrays, causing a mismatch during model evaluation.",
          D: "It forces the model to interpret the training data as an unsupervised clustering task."
        },
        answer: "B",
        explanation: "Fitting a scaler on the entire dataset prior to splitting exposes the training set to statistical parameters (min/max values) belonging to the test set. This constitutes data leakage, artificially inflating validation performance while undermining the model’s true capability to generalize to independent data."
      },
      {
        id: 9,
        question: "During Exploratory Data Analysis (EDA) of a used car dataset, an analyst observes that 'Vehicle Mileage' and 'Vehicle Age (in years)' exhibit a near-perfect linear negative correlation. In terms of unsupervised data transformations, what is the most efficient architectural recommendation before feeding this data into a downstream algorithm?",
        options: {
          A: "Apply Normalizer to scale both features to a Euclidean length of 1.",
          B: "Use a dimensionality reduction algorithm to merge the correlated features into a single latent feature representing 'Wear and Tear'.",
          C: "Clone both features to double their mathematical weight during distance calculation.",
          D: "Force the dataset through an association rule mining model to establish itemset transactions."
        },
        answer: "B",
        explanation: "Strongly correlated features contain redundant information, which increases computational costs and can trigger the curse of dimensionality. Dimensionality reduction allows for feature merging (e.g., combining Mileage and Age into 'Wear and Tear'), which optimizes storage, speeds up execution, and preserves core information."
      },
      {
        id: 10,
        question: "When evaluating an unsupervised anomaly detection model during its deployment or 'Detection Phase', how does its operational mechanism contrast with its initial 'Training Phase'?",
        options: {
          A: "In the Training Phase, it dynamically maps labels to inputs; in the Detection Phase, it computes precision scores.",
          B: "In the Training Phase, it learns the statistical boundaries of 'normal' data; in the Detection Phase, it evaluates new incoming instances against that established boundary to flag anomalies.",
          C: "In the Training Phase, it clusters data using labels; in the Detection Phase, it discards those clusters entirely.",
          D: "The phases are identical, as unsupervised models must continuously re-calculate their parameters for every new single input."
        },
        answer: "B",
        explanation: "Unsupervised anomaly detection operates in a two-phase dichotomy: a Training Phase, where the system analyzes unlabeled data to establish a structural baseline of what constitutes 'normal' behavior, and a Detection Phase, where new operational instances are strictly evaluated against that baseline to determine if they deviate sufficiently to be classified as anomalies."
      },
      {
        id: 11,
        question: "An analyst is performing Exploratory Data Analysis (EDA) on a noisy sensor dataset. They draw a series of representations to search for patterns and ask, 'What shapes can I see and why?' Which statistical approach does this informal, pattern-seeking behavior characterize?",
        options: {
          A: "Formal Hypothesis Testing via p-values.",
          B: "Exploratory Data Analysis (EDA) as an exploratory approach to statistics using visualizations and robust measures.",
          C: "Supervised Decision Boundary Optimization.",
          D: "Association Rule Learning for transaction mapping."
        },
        answer: "B",
        explanation: "EDA is defined as an informal and exploratory approach to statistics characterized by drawing different representations, searching for patterns, using graphs/charts, and leveraging robust measures to comprehend the data's underlying structure before formal modeling."
      },
      {
        id: 12,
        question: "An SVM classifier utilizing an RBF kernel is trained on an unscaled dataset where Feature $X_1$ ranges from $0$ to $1$, and Feature $X_2$ ranges from $0$ to $100,000$. What is the direct operational impact on the support vectors chosen by the model?",
        options: {
          A: "The support vectors will be chosen completely at random due to numeric underflow.",
          B: "Support vectors will be determined almost entirely by the values of Feature $X_2$ because its massive scale skews the distance computations inherent to the RBF kernel.",
          C: "The model will automatically down-weight Feature $X_2$ to zero to balance the margin.",
          D: "The decision boundary will become perfectly symmetric and centered at zero."
        },
        answer: "B",
        explanation: "The RBF kernel computes exponential distance metrics between points. If features have profoundly mismatched scales, the feature with the vastly larger magnitude ($X_2$) will completely dominate the distance calculation, forcing the SVM to construct its support vectors and decision boundary almost entirely based on that single dimension, rendering $X_1$ irrelevant."
      },
      {
        id: 13,
        question: "An unsupervised learning system is applied to a retail dataset containing transaction records of customer purchases. The algorithm outputs the statement: '93% of people who purchased item A also purchased item B'. What specific category of unsupervised learning produced this result?",
        options: {
          A: "Dimensionality Reduction via feature extraction.",
          B: "Anomaly Detection utilizing Z-score standardizations.",
          C: "Association Rule Learning, aimed at finding meaningful relationships between features.",
          D: "Single-Class Novelty Detection."
        },
        answer: "C",
        explanation: "Association Rule Learning is a distinct branch of unsupervised learning explicitly designed to discover meaningful hidden dependencies, patterns, and co-occurrence relationships between different items or features in large datasets (e.g., market basket analysis)."
      },
      {
        id: 14,
        question: "A data science student decides to optimize a machine learning pipeline by executing separate scaling routines: they apply MinMaxScaler.fit_transform() to the training set, and a completely independent MinMaxScaler.fit_transform() to the test set. What is the technical consequence of this setup?",
        options: {
          A: "It ensures maximum accuracy because each dataset is scaled perfectly to its own native boundaries.",
          B: "It distorts the spatial relationship between the training and testing sets, introducing artificial discrepancies that degrade model performance.",
          C: "It changes the matrix shapes of the features, preventing the model from running.",
          D: "It transforms the supervised learning objective into a feature merging optimization problem."
        },
        answer: "B",
        explanation: "Scaling the test set independently using its own statistics shifts and stretches its points to fit a new coordinate system that is decoupled from the training set's space. This breaks the spatial consistency across the train/test split, leading to performance degradation because the model's learned decision boundaries no longer map to the same physical realities."
      },
      {
        id: 15,
        question: "You are reviewing a tabular dataset where features represent demographic metrics. Feature $A$ has a mean of 50 and a standard deviation of 5. Feature $B$ has a mean of 1000 and a standard deviation of 200. After applying StandardScaler, what will be the exact mathematical mean ($\mu$) and variance ($\sigma^2$) of both features?",
        options: {
          A: "Mean = 0, Variance = 1 for both features.",
          B: "Mean = 50, Variance = 1 for Feature A; Mean = 1000, Variance = 1 for Feature B.",
          C: "Mean = 0, Variance = 5 for Feature A; Mean = 0, Variance = 200 for Feature B.",
          D: "The ranges will compress strictly between 0 and 1, leaving means unchanged."

    // State Management
    let currentIndex = 0;
    let isPracticeMode = true;
    let userAnswers = {}; // { questionId: "A" | "B" | "C" | "D" }

    // DOM Elements
    const qNumberEl = document.getElementById('qNumber');
    const qTextEl = document.getElementById('qText');
    const qOptionsEl = document.getElementById('qOptions');
    const explanationBoxEl = document.getElementById('explanationBox');
    const explanationTextEl = document.getElementById('explanationText');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const gridNavEl = document.getElementById('gridNav');
    const scoreTrackerEl = document.getElementById('scoreTracker');
    const progressBarEl = document.getElementById('progressBar');
    const modeToggleBtn = document.getElementById('modeToggleBtn');
    const modeBadgeEl = document.getElementById('modeBadge');
    const themeToggleBtn = document.getElementById('themeToggleBtn');

    // Initialize Sidebar Grid Navigation
    function initSidebar() {
      gridNavEl.innerHTML = '';
      questionsData.forEach((q, index) => {
        const btn = document.createElement('button');
        btn.className = 'grid-nav-btn';
        btn.innerText = q.id;
        btn.id = `nav-btn-${q.id}`;
        btn.addEventListener('click', () => jumpToQuestion(index));
        gridNavEl.appendChild(btn);
      });
    }

    // Render Question
    function renderQuestion() {
      const q = questionsData[currentIndex];

      // Update Question Number & Text
      qNumberEl.innerText = `Question ${q.id} of ${questionsData.length}`;
      qTextEl.innerText = q.question;

      // Render Options
      qOptionsEl.innerHTML = '';
      const selectedAns = userAnswers[q.id];

      Object.entries(q.options).forEach(([key, text]) => {
        const optionItem = document.createElement('div');
        optionItem.className = 'option-item';

        if (selectedAns) {
          if (key === selectedAns) optionItem.classList.add('selected');
          if (isPracticeMode) {
            if (key === q.answer) optionItem.classList.add('correct');
            if (key === selectedAns && selectedAns !== q.answer) optionItem.classList.add('incorrect');
          }
        }

        optionItem.innerHTML = `
          <span class="option-key">${key}.</span>
          <span class="option-text">${text}</span>
        `;

        optionItem.addEventListener('click', () => selectAnswer(q.id, key));
        qOptionsEl.appendChild(optionItem);
      });

      // Explanation Box
      if (isPracticeMode && selectedAns) {
        explanationTextEl.innerText = q.explanation;
        explanationBoxEl.classList.add('show');
      } else {
        explanationBoxEl.classList.remove('show');
      }

      // Sidebar Active Highlight
      document.querySelectorAll('.grid-nav-btn').forEach(btn => btn.classList.remove('active'));
      const activeNavBtn = document.getElementById(`nav-btn-${q.id}`);
      if (activeNavBtn) activeNavBtn.classList.add('active');

      // Re-trigger MathJax typesetting for equations
      if (window.MathJax) {
        MathJax.typesetPromise([qTextEl, qOptionsEl, explanationBoxEl]).catch(err => console.log(err));
      }

      // Update Navigation Buttons
      prevBtn.disabled = currentIndex === 0;
      nextBtn.innerText = currentIndex === questionsData.length - 1 ? 'Finish' : 'Next →';
    }

    // Handle Option Selection
    function selectAnswer(qId, key) {
      userAnswers[qId] = key;
      updateStatus();
      renderQuestion();
    }

    // Update Progress and Sidebar Styles
    function updateStatus() {
      let solvedCount = 0;

      questionsData.forEach(q => {
        const userAns = userAnswers[q.id];
        const btn = document.getElementById(`nav-btn-${q.id}`);

        if (userAns && btn) {
          solvedCount++;
          if (isPracticeMode) {
            if (userAns === q.answer) {
              btn.className = 'grid-nav-btn correct';
            } else {
              btn.className = 'grid-nav-btn incorrect';
            }
          } else {
            btn.className = 'grid-nav-btn active';
          }
        }
      });

      scoreTrackerEl.innerText = `${solvedCount} / ${questionsData.length} Solved`;
      progressBarEl.style.width = `${(solvedCount / questionsData.length) * 100}%`;
    }

    // Jump to specific question
    function jumpToQuestion(index) {
      currentIndex = index;
      renderQuestion();
    }

    // Next/Prev Listeners
    nextBtn.addEventListener('click', () => {
      if (currentIndex < questionsData.length - 1) {
        currentIndex++;
        renderQuestion();
      }
    });

    prevBtn.addEventListener('click', () => {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    });

    // Toggle Practice / Exam Mode
    modeToggleBtn.addEventListener('click', () => {
      isPracticeMode = !isPracticeMode;
      modeToggleBtn.innerText = isPracticeMode ? 'Mode: Practice' : 'Mode: Exam';
      modeBadgeEl.innerText = isPracticeMode ? 'Practice Mode' : 'Exam Mode';
      updateStatus();
      renderQuestion();
    });

    // Toggle Theme
    themeToggleBtn.addEventListener('click', () => {
      const currentTheme = document.body.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', newTheme);
      themeToggleBtn.innerText = newTheme === 'dark' ? '🌙 Dark' : '☀️ Light';
    });

    // Init App
    initSidebar();
    renderQuestion();
  </script>
